server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/hackathon
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update

management:
  endpoints:
    web:
      exposure:
        include: "*"

  metrics:
    export:
      prometheus:
        enabled: true
