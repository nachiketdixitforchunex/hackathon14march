version: "3"

services:

 postgres:
  image: postgres:15
  environment:
   POSTGRES_DB: hackathon
   POSTGRES_USER: postgres
   POSTGRES_PASSWORD: postgres
  ports:
   - "5432:5432"

 backend:
  build: ./backend
  ports:
   - "8080:8080"
  depends_on:
   - postgres

 frontend:
  build: ./frontend
  ports:
   - "5173:5173"

 prometheus:
  image: prom/prometheus
  volumes:
   - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
  ports:
   - "9090:9090"

 grafana:
  image: grafana/grafana
  ports:
   - "3000:3000"

 loki:
  image: grafana/loki
  ports:
   - "3100:3100"

 tempo:
  image: grafana/tempo
  ports:
   - "3200:3200"
